<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empleados</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/responsive/3.0.5/css/responsive.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/2.3.8/css/dataTables.dataTables.css" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.datatables.net/2.3.8/js/dataTables.js"></script>
    <script src="https://cdn.datatables.net/responsive/3.0.5/js/dataTables.responsive.min.js"></script>
</head>

<body>
    <div class="container py-4">
        <div class="card shadow">
            <div class="card-header">
                <h4 class="mb-0">Lista de Empleados</h4>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table id="empleadosTable" class="table table-striped table-bordered align-middle">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Nombre</th>
                                <th>Correo</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for empleado in empleados %}
                            <tr>
                                <td>{{ forloop.counter }}</td>
                                <td>{{ empleado.nombre }}</td>
                                <td>{{ empleado.correo }}</td>
                                <td class="text-center">
                                    <button class="btn btn-primary btn-sm enviar-correo"
                                        data-correo="{{ empleado.correo }}">
                                        <i class="bi bi-envelope"></i>
                                        <span class="d-none d-md-inline">
                                            Enviar Correo
                                        </span>
                                    </button>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        $(document).ready(function () {
            $('#empleadosTable').DataTable({
                responsive: true,
                language: {
                    url: 'https://cdn.datatables.net/plug-ins/2.3.2/i18n/es-ES.json'
                }
            });
            $(document).on('click', '.enviar-correo', function () {
                const correo = $(this).data('correo');
                Swal.fire({
                    title: 'Enviar correo',
                    html: `
                        <div class="form-group">
                            <input type="text" id="asunto" class="form-control" placeholder="Ingrese el asunto">
                        </div>
                        <div class="form-group mt-2">
                            <textarea id="mensaje" class="form-control" placeholder="Ingrese el mensaje"></textarea>
                        </div>
                    `,
                    focusConfirm: false,
                    preConfirm: () => {
                        const asunto = document.getElementById('asunto').value;
                        const mensaje = document.getElementById('mensaje').value;
                        if (!asunto || !mensaje) {
                            Swal.showValidationMessage('Por favor, complete ambos campos');
                            return false;
                        }
                        return { asunto: asunto, mensaje: mensaje, correo: correo };
                    }
                }).then((result) => {
                    if (result.isConfirmed && result.value) {
                        $.ajax({
                            url: '{% url "enviar_correo" %}',
                            method: 'POST',
                            data: {
                                'asunto': result.value.asunto,
                                'mensaje': result.value.mensaje,
                                'correo': result.value.correo,
                                'csrfmiddlewaretoken': '{{ csrf_token }}'
                            },
                            success: function (response) {
                                Swal.fire('Éxito', 'Correo enviado correctamente', 'success');
                            },
                            error: function () {
                                Swal.fire('Error', 'Hubo un error al enviar el correo', 'error');
                            }
                        });
                    }
                });
            });
        });
    </script>
</body>

</html>
