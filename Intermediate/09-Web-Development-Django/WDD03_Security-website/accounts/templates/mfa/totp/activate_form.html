{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="max-w-md mx-auto w-full px-4">
    <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
        <h2 class="text-2xl font-bold text-slate-900 text-center mb-2">Activar 2FA</h2>
        <p class="text-sm text-slate-500 text-center mb-8">Escanea el código con tu app (Google Authenticator, Authy, etc.)</p>
        
        <div class="bg-slate-50 p-6 rounded-xl border border-slate-200 flex justify-center mb-8">
            <img src="{{ totp_svg_data_uri }}" alt="QR Code" class="w-48 h-48">
        </div>

        <form method="post" class="space-y-4">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="w-full bg-blue-600 text-white font-medium py-2.5 rounded-lg hover:bg-blue-700 transition-all">
                Verificar y Activar
            </button>
        </form>
    </div>
</div>
{% endblock %}
