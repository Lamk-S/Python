{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="max-w-md mx-auto w-full px-4">
    <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
        <h2 class="text-2xl font-bold text-slate-900 text-center mb-2">Confirmar acceso (2FA)</h2>
        <p class="text-sm text-slate-500 text-center mb-6">Ingresa el código de tu aplicación de autenticación.</p>

        <form method="post" class="space-y-4">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="w-full bg-blue-600 text-white font-medium py-2.5 rounded-lg hover:bg-blue-700 transition-all">
                Verificar Código
            </button>
        </form>

        <div class="mt-6 text-center border-t border-slate-100 pt-4">
            <p class="text-sm text-slate-600 mb-2">Opciones alternativas:</p>
            <a href="{% url 'account_reauthenticate' %}" class="text-sm text-blue-600 hover:text-blue-800 hover:underline">
                Utiliza tu contraseña
            </a>
        </div>
    </div>
</div>
{% endblock %}
