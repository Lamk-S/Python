{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="w-full max-w-md mx-auto">
    <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
        <div class="text-center mb-8">
            <h2 class="text-2xl font-extrabold text-slate-900">Generar Códigos</h2>
            <p class="text-sm text-slate-500 mt-2">Esta acción invalidará tus códigos anteriores.</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="w-full bg-blue-600 text-white font-medium py-2.5 rounded-lg mt-4 hover:bg-blue-700 transition-all">
                Generar nuevos códigos
            </button>
        </form>
    </div>
</div>
{% endblock %}
