{% extends 'base.html' %}

{% block content %}
<div class="w-full max-w-md mx-auto">
    <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 text-center">
        <!-- Ícono de Correo -->
        <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
            </svg>
        </div>
        
        <h2 class="text-2xl font-extrabold text-slate-900 mb-2">Verifica tu correo</h2>
        <p class="text-sm text-slate-500 mt-2">
            Hemos enviado un enlace de confirmación a tu correo electrónico. Por favor, revísalo para poder activar tu cuenta y acceder al sistema.
        </p>
        
        <div class="mt-8">
            <a href="{% url 'login' %}" class="text-blue-600 font-medium hover:underline text-sm">
                &larr; Volver al inicio de sesión
            </a>
        </div>
    </div>
</div>
{% endblock %}
