{% extends 'base.html' %}
{% load socialaccount %}

{% block content %}
<div class="w-full max-w-md mx-auto">
    <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
        <div class="text-center mb-8">
            <h2 class="text-2xl font-extrabold text-slate-900">Bienvenido de vuelta</h2>
            <p class="text-sm text-slate-500 mt-2">Ingresa tus datos para continuar</p>
        </div>

        <form method="POST" class="space-y-5">
            {% csrf_token %}
            
            <div class="space-y-1">
                <label class="block text-sm font-medium text-slate-700">Usuario o correo</label>
                {{ form.login }}
            </div>
            
            <div class="space-y-1">
                <label class="block text-sm font-medium text-slate-700">Contraseña</label>
                {{ form.password }}
            </div>
            
            <div class="flex items-center justify-between mt-4">
                <div class="flex items-center space-x-2">
                    {{ form.remember }}
                    <label for="{{ form.remember.id_for_label }}" class="text-sm text-slate-600 font-medium cursor-pointer select-none">
                        Recordarme
                    </label>
                </div>
            </div>
            
            <button type="submit" class="w-full bg-blue-600 text-white font-medium py-2.5 rounded-lg hover:bg-blue-700 focus:ring-4 focus:ring-blue-600/20 transition-all duration-200">
                Iniciar sesión
            </button>
        </form>

        <div class="relative my-6">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-slate-200"></div>
            </div>
            <div class="relative flex justify-center text-sm">
                <span class="px-2 bg-white text-slate-500">O continúa con</span>
            </div>
        </div>

        <form action="{% provider_login_url 'google' %}" method="POST" class="w-full">
            {% csrf_token %}
            <button type="submit" class="w-full flex items-center justify-center gap-3 bg-white border border-slate-300 text-slate-700 font-medium py-2.5 rounded-lg hover:bg-slate-50 focus:ring-4 focus:ring-slate-100 transition-all duration-200">
                <!-- SVG Oficial de Google -->
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Continuar con Google
            </button>
        </form>
    </div>
    <p class="text-center text-sm text-slate-600 mt-6">
        ¿No tienes una cuenta? <a href="{% url 'register' %}" class="text-blue-600 font-medium hover:underline">Regístrate</a>
    </p>
</div>
{% endblock %}
