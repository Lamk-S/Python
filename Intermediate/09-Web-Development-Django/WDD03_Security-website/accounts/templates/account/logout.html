{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="w-full max-w-md mx-auto">
    <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 text-center">
        <h2 class="text-2xl font-extrabold text-slate-900 mb-4">Cerrar Sesión</h2>
        <p class="text-sm text-slate-500 mb-8">¿Estás seguro de que deseas salir de tu cuenta?</p>
        
        <form method="POST" action="{% url 'account_logout' %}">
            {% csrf_token %}
            {% if redirect_field_value %}
            <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}"/>
            {% endif %}
            <button type="submit" class="w-full bg-red-600 text-white font-medium py-2.5 rounded-lg hover:bg-red-700 transition-all duration-200">
                Sí, cerrar sesión
            </button>
        </form>
    </div>
</div>
{% endblock %}
