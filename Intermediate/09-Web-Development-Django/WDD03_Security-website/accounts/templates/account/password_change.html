{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="w-full max-w-md mx-auto">
    <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
            </div>
            <h2 class="text-2xl font-extrabold text-slate-900">Cambiar Contraseña</h2>
            <p class="text-sm text-slate-500 mt-2">Por seguridad, usa una contraseña fuerte y que no uses en otros sitios.</p>
        </div>

        <form method="POST" action="{% url 'account_change_password' %}">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" name="action" class="w-full bg-blue-600 text-white font-medium py-2.5 rounded-lg mt-6 hover:bg-blue-700 focus:ring-4 focus:ring-blue-600/20 transition-all duration-200">
                Actualizar contraseña
            </button>
        </form>
    </div>
    
    <div class="text-center mt-6">
        <a href="{% url 'home' %}" class="text-sm font-medium text-slate-500 hover:text-slate-800 transition-colors">&larr; Volver al Dashboard</a>
    </div>
</div>
{% endblock %}
