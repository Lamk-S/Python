{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="w-full max-w-md mx-auto">
    <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path>
                </svg>
            </div>
            <h2 class="text-2xl font-extrabold text-slate-900">Recuperar Contraseña</h2>
            <p class="text-sm text-slate-500 mt-2">Ingresa tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña.</p>
        </div>

        <form method="POST" action="{% url 'account_reset_password' %}">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="w-full bg-blue-600 text-white font-medium py-2.5 rounded-lg mt-6 hover:bg-blue-700 focus:ring-4 focus:ring-blue-600/20 transition-all duration-200">
                Enviar enlace de recuperación
            </button>
        </form>
    </div>
    
    <div class="text-center mt-6">
        <a href="{% url 'login' %}" class="text-sm font-medium text-slate-500 hover:text-slate-800 transition-colors">&larr; Volver al inicio de sesión</a>
    </div>
</div>
{% endblock %}
